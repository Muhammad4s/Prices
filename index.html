<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>أسعار المحل</title>

<style>

*{
    box-sizing:border-box;
}

body{
    font-family: Arial, sans-serif;
    background:#f3f4f6;
    margin:0;
    padding:20px;
}

.container{
    max-width:600px;
    margin:auto;
}

.logo{
    width:90px;
    height:90px;
    background:white;
    border-radius:50%;
    margin:10px auto;
    display:flex;
    align-items:center;
    justify-content:center;
    box-shadow:0 3px 10px #ddd;
    font-size:40px;
}

h1{
    text-align:center;
    color:#d35400;
    margin-bottom:25px;
}

#search{
    width:100%;
    padding:18px;
    border:none;
    border-radius:15px;
    font-size:18px;
    box-shadow:0 3px 10px #ddd;
    outline:none;
}

.item{
    background:white;
    margin-top:15px;
    padding:18px;
    border-radius:15px;
    display:flex;
    justify-content:space-between;
    align-items:center;
    box-shadow:0 3px 10px #ddd;
    font-size:18px;
}

.price{
    color:#16a085;
    font-weight:bold;
}

</style>
</head>

<body>

<div class="container">

<h1>أسعار المحل</h1>

<input
id="search"
type="text"
placeholder="اكتب اسم الصنف...">

<div id="results"></div>

</div>

<script>

let products = [];

fetch("https://docs.google.com/spreadsheets/d/e/2PACX-1vSQ-3vJOiDehFOVjBKd7ruYF9EV6F-GJp5JBzj2nU9ew5-dCf275Qbze4DcIvkac18Nw8fuFtswx-Un/pub?output=csv")
.then(response => response.text())
.then(data => {

const rows = data.trim().split("\n");

rows.shift();

products = rows.map(row => {

const cols = row.split(",");

return {
name: cols[0],
price: cols[1] + " جنيه"
};

});

showProducts("");

});

const search=document.getElementById("search");
const results=document.getElementById("results");

function showProducts(text){

results.innerHTML="";

products
.filter(p=>p.name.includes(text))
.forEach(p=>{

results.innerHTML+=`
<div class="item">
<span>${p.name}</span>
<span class="price">${p.price}</span>
</div>
`;

});

}

showProducts("");

search.addEventListener("input",()=>{

showProducts(search.value);

});

</script>

</body>
</html>
