<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;800&display=swap" rel="stylesheet">

<title>أولاد سلامة</title>

<style>

*{
box-sizing:border-box;
}

body{
font-family:'Tajawal', sans-serif;
background:#f5f5f5;
margin:0;
padding:20px;
}

.container{
max-width:600px;
margin:auto;
}

/* اللوجو */
.logo{
width:100px;
height:100px;
background:white;
border-radius:50%;
margin:10px auto;
display:flex;
align-items:center;
justify-content:center;
overflow:hidden;
box-shadow:0 4px 12px #ccc;
}

.logo img{
width:100%;
height:100%;
object-fit:cover;
}


/* اسم المحل */
h1{
text-align:center;
color:#d35400;
font-size:32px;
font-weight:800;
margin:15px 0 25px;
}


/* البحث */
#search{
width:100%;
padding:18px;
border:none;
border-radius:15px;
font-size:18px;
outline:none;
box-shadow:0 3px 12px #ddd;
}


/* الأصناف */
.item{
background:white;
margin-top:15px;
padding:18px;
border-radius:15px;
display:flex;
justify-content:space-between;
align-items:center;
font-size:20px;
font-weight:500;
box-shadow:0 3px 10px #ddd;
}

.price{
color:#16a085;
font-weight:bold;
}


.empty{
text-align:center;
margin-top:30px;
color:#777;
font-size:18px;
}


</style>

</head>


<body>


<div class="container">


<div class="logo">

<img src="logo.png" alt="Logo">

</div>


<h1>أولاد سلامة</h1>


<input 
id="search"
type="text"
placeholder="🔍 اكتب اسم الصنف...">


<div id="results"></div>


</div>



<script>


let products=[];


fetch("https://docs.google.com/spreadsheets/d/e/2PACX-1vSQ-3vJOiDehFOVjBKd7ruYF9EV6F-GJp5JBzj2nU9ew5-dCf275Qbze4DcIvkac18Nw8fuFtswx-Un/pub?output=csv")

.then(response=>response.text())

.then(data=>{


const rows=data.trim().split("\n");


rows.shift();


products=rows.map(row=>{


const cols=row.split(",");


return{

name:cols[0],

price:cols[1]+" جنيه"

};


});


showProducts("");


});



const search=document.getElementById("search");

const results=document.getElementById("results");



function showProducts(text){


results.innerHTML="";


let found=products.filter(p=>

p.name.includes(text)

);



if(found.length===0){

results.innerHTML='<div class="empty">الصنف غير موجود</div>';

return;

}



found.forEach(p=>{


results.innerHTML+=`

<div class="item">

<span>${p.name}</span>

<span class="price">${p.price}</span>

</div>

`;


});


}



search.addEventListener("input",()=>{


showProducts(search.value);


});



</script>


</body>

</html>
