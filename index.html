<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;800&display=swap" rel="stylesheet">

<title>أولاد سلامة</title>

<link rel="manifest" href="manifest.json">


<style>

*{
box-sizing:border-box;
}


body{
font-family:'Tajawal',sans-serif;
background:#f4f4f4;
margin:0;
padding:20px;
}


.container{
max-width:650px;
margin:auto;
}


/* اللوجو */

.logo{
width:110px;
height:110px;
margin:10px auto;
background:white;
border-radius:50%;
overflow:hidden;
box-shadow:0 5px 15px #ccc;
}


.logo img{
width:100%;
height:100%;
object-fit:cover;
}



/* العنوان */

h1{
text-align:center;
font-size:34px;
font-weight:800;
color:#d35400;
margin:15px 0 25px;
}



/* البحث */

.search-box{
position:relative;
}


#search{

width:100%;
padding:18px 45px 18px 18px;
border:none;
border-radius:18px;
font-family:'Tajawal';
font-size:18px;
font-weight:500;
outline:none;
box-shadow:0 4px 15px #ddd;

}


.clear{

position:absolute;
left:15px;
top:15px;
cursor:pointer;
font-size:22px;
color:#777;

}



/* التصنيفات */

.categories{

display:flex;
gap:10px;
overflow-x:auto;
margin:20px 0;
padding-bottom:5px;

}


.category{

background:white;
padding:10px 18px;
border-radius:25px;
white-space:nowrap;
cursor:pointer;
font-weight:700;
box-shadow:0 3px 10px #ddd;

}


.category.active{

background:#d35400;
color:white;

}



/* النتائج */

.item{

background:white;
margin-top:15px;
padding:20px;
border-radius:18px;
display:flex;
justify-content:space-between;
align-items:center;
box-shadow:0 4px 12px #ddd;

}


.name{

font-size:20px;
font-weight:700;

}


.price{

font-size:22px;
font-weight:800;
color:#16a085;

}



.suggestion{

background:white;
padding:12px;
border-bottom:1px solid #eee;
cursor:pointer;
font-size:18px;

}


#suggestions{

border-radius:10px;
overflow:hidden;

}



.empty{

text-align:center;
margin-top:40px;
font-size:20px;
color:#777;

}



</style>


</head>


<body>


<div class="container">


<div class="logo">

<img src="logo.png">

</div>



<h1>قائمة الأسعار</h1>



<div class="search-box">

<input id="search"
placeholder="🔍 ابحث عن الصنف..."
autocomplete="off">

<div class="clear" onclick="clearSearch()">×</div>

</div>



<div id="suggestions"></div>



<div class="categories" id="categories"></div>



<div id="results"></div>



</div>




<script>


let products=[];

let selectedCategory="الكل";



fetch("https://docs.google.com/spreadsheets/d/e/2PACX-1vSQ-3vJOiDehFOVjBKd7ruYF9EV6F-GJp5JBzj2nU9ew5-dCf275Qbze4DcIvkac18Nw8fuFtswx-Un/pub?output=csv")


.then(r=>r.text())


.then(data=>{


let rows=data.trim().split("\n");


rows.shift();



products=rows.map(row=>{


let cols=row.split(",");


return {

name:cols[0],

price:cols[1] ? cols[1]+" جنيه" : "",

category:cols[2] || "أخرى"

};


});



createCategories();

showProducts("");

});





const search=document.getElementById("search");

const results=document.getElementById("results");

const suggestions=document.getElementById("suggestions");





function createCategories(){


let cats=["الكل"];


products.forEach(p=>{

if(!cats.includes(p.category))
cats.push(p.category);

});



categories.innerHTML="";


cats.forEach(c=>{


categories.innerHTML+=`

<div class="category ${c=="الكل"?"active":""}"
onclick="chooseCategory('${c}',this)">

${c}

</div>

`;


});


}





function chooseCategory(cat,el){


selectedCategory=cat;


document.querySelectorAll(".category")
.forEach(x=>x.classList.remove("active"));


el.classList.add("active");


showProducts(search.value);


}





function showProducts(text){


results.innerHTML="";


let found=products.filter(p=>{


let nameMatch=p.name.includes(text);


let catMatch=
selectedCategory=="الكل" ||
p.category==selectedCategory;


return nameMatch && catMatch;


});



if(found.length==0){

results.innerHTML=
'<div class="empty">لا يوجد صنف</div>';

return;

}



found.forEach(p=>{


results.innerHTML+=`

<div class="item">

<div class="name">${p.name}</div>

<div class="price">${p.price}</div>

</div>

`;


});


}




search.addEventListener("input",()=>{


let text=search.value;


suggestions.innerHTML="";


let matches=products.filter(p=>
p.name.includes(text)
);



matches.slice(0,5).forEach(p=>{


suggestions.innerHTML+=`

<div class="suggestion"
onclick="selectProduct('${p.name}')">

${p.name}

</div>

`;

});


showProducts(text);


});





function selectProduct(name){


search.value=name;

suggestions.innerHTML="";

showProducts(name);


}




function clearSearch(){


search.value="";

suggestions.innerHTML="";

showProducts("");

}



</script>


</body>

</html>
